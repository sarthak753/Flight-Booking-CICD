name: Flight Booking CICD

on:
  push:
    branches:
      - dev
      - main

jobs:
  upload-to-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload Variables JSON to GCS
        run: |
          gsutil cp variables/dev/variables.json gs://asia-east1-airflow-test-f872f771-bucket/data/dev/variables.json

      - name: Import Variables into Airflow-TEST
        run: |
          gcloud composer environments run airflow-test \
            --location asia-east1 \
            variables import -- /home/airflow/gcs/data/dev/variables.json

      - name: Upload Spark Job to GCS
        run: |
          gsutil cp spark_job/spark_transformation_job.py gs://asia-east1-airflow-test-f872f771-bucket/airflow-project-1/spark-job/

      - name: Upload Airflow DAG to TEST
        run: |
          gcloud composer environments storage dags import \
            --environment airflow-test \
            --location asia-east1 \
            --source airflow_job/airflow_job.py

  upload-to-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload Variables JSON to GCS
        run: |
          gsutil cp variables/prod/variables.json gs://asia-east1-airflow-prod-5fd790a9-bucket/data/prod/variables.json

      - name: Import Variables into Airflow-PROD
        run: |
          gcloud composer environments run airflow-prod \
            --location asia-east1 \
            variables import -- /home/airflow/gcs/data/prod/variables.json

      - name: Upload Spark Job to GCS
        run: |
          gsutil cp spark_job/spark_transformation_job.py gs://asia-east1-airflow-prod-5fd790a9-bucket/airflow-project-1/spark-job/

      - name: Upload Airflow DAG to PROD
        run: |
          gcloud composer environments storage dags import \
            --environment airflow-prod \
            --location asia-east1 \
            --source airflow_job/airflow_job.py
